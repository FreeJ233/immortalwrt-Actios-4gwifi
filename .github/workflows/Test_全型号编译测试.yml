#
# 全型号并行编译测试 - 一键测试所有型号，失败的 job 单独标红
#

name: Test_全型号编译测试

on:
  workflow_dispatch:

jobs:
  build:
    name: 编译 ${{ matrix.profile }}
    strategy:
      fail-fast: false  # 某个型号失败不取消其他
      matrix:
        profile:
          - ufi003
          - ufi001c
          - ufi001b
          - ufi103s
          - jz02v10
          - qrzl903
          - w001
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
    uses: ./.github/workflows/Build_高通410 imm.yml
    with:
      profile: ${{ matrix.profile }}
      extra_packages: ''
